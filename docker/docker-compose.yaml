name: vdt
services:
  graphdb:
    image: ontotext/graphdb:10.8.8
    ports:
      - "7200:7200"
    volumes:
      - graphdb-data:/opt/graphdb/home
    restart: unless-stopped

  backend:
    build:
      context: ../backend
    env_file:
      - path: ../backend/.env
        required: false
    environment:
      GRAPHDB_URL: http://graphdb:7200
      GRAPHDB_REPOSITORY: DBPEDIA
      FRONTEND_ORIGIN: http://localhost:5200
      ONTOLOGY_SCHEMA_PATH: /app/Ontology/ontology--DEV_type=parsed_sorted.nt
      ONTOLOGY_LOOKUP_DB_PATH: /app/Ontology/normalized/embedding_lookup.sqlite
      ONTOLOGY_LOOKUP_DOCUMENTS_PATH: /app/Ontology/normalized/embedding_documents.jsonl
    volumes:
      - ../Ontology:/app/Ontology:ro
    ports:
      - "8090:8000"
    restart: unless-stopped
  ontology-lookup:
    build:
      context: ../backend
    environment:
      LOOKUP_DOCUMENTS_PATH: /app/Ontology/normalized/embedding_documents.jsonl
      LOOKUP_DB_PATH: /app/Ontology/normalized/embedding_lookup.sqlite
    volumes:
      - ../Ontology:/app/Ontology:ro
    ports:
      - "8091:8001"
    command:
      [
        "uvicorn",
        "app.lookup_service:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8001",
      ]
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8090
    ports:
      - "5200:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  graphdb-data:
