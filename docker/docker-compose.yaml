name: vdt
services:
  backend:
    build:
      context: ../backend
    env_file:
      - path: ../backend/.env
        required: false
    environment:
      GRAPHDB_URL: http://graphdb:7200
      FRONTEND_ORIGIN: http://localhost:5200
      QDRANT_URL: http://qdrant:6333
      ONTOLOGY_SCHEMA_PATH: /app/Ontology/ontology--DEV_type=parsed_sorted.nt
    volumes:
      - ../Ontology:/app/Ontology:ro
    ports:
      - "8090:8000"
    depends_on:
      - graphdb
      - qdrant
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8090
    ports:
      - "5200:5173"
    depends_on:
      - backend
    restart: unless-stopped

  graphdb:
    image: ontotext/graphdb:10.8.4
    ports:
      - "7200:7200"
    volumes:
      - graphdb-data:/opt/graphdb/home
      - ../Ontology:/opt/graphdb/home/graphdb-import:ro
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6363:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

volumes:
  graphdb-data:
  qdrant-data:
